# ============================================================
# النسخة السادسة - GitHub Actions Workflow
# V6 - 3 منصات: Windows (RDP) + Linux (XRDP+XFCE) + macOS (VNC)
# 12 Runner: 4 Windows + 5 Linux + 3 macOS (بما فيها ARM)
# إشعارات ذكية + إعادة تلقائية + جلسات متعددة + تنبيهات وقت
# ============================================================

name: V6 Remote Desktop - Multi-Platform

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'اختر المنصة: all / windows / linux / macos'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - windows
          - linux
          - macos
      session_name:
        description: 'اسم الجلسة'
        required: false
        default: 'v6-session'
      time_limit_minutes:
        description: 'مدة الجلسة بالدقائق'
        required: false
        default: '360'
        type: string

  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  VERSION: "6.0"
  MAX_RETRIES: 20
  BASE_DELAY: 2

concurrency:
  group: v6-remote-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ═══════════════════════════════════════════
  # WINDOWS - 4 Runners (RDP)
  # ═══════════════════════════════════════════

  windows-server-2019:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'windows' || github.event_name != 'workflow_dispatch' }}
    runs-on: windows-2019
    timeout-minutes: ${{ fromJson(github.event.inputs.time_limit_minutes || '360') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup RDP - Windows Server 2019
        run: |
          Write-Host "=== V6 - Windows Server 2019 (RDP) ==="
          Write-Host "Platform: Windows Server 2019 | Arch: x64 | Protocol: RDP"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Write-Host "RDP enabled on Windows Server 2019"

      - name: Smart Notification - RDP Active
        run: |
          Write-Host "=== Smart Notification (Adaptive) ==="
          Write-Host "Connection Type: RDP Active"
          Write-Host "Notification Style: Silent (non-intrusive)"
          Write-Host "System Tray: Enabled | Sound: Disabled | Popups: Disabled"

      - name: Time Alert Setup
        run: |
          $limit = ${{ fromJson(github.event.inputs.time_limit_minutes || '360') }}
          $warn = [math]::Floor($limit * 0.75)
          $critical = [math]::Floor($limit * 0.90)
          Write-Host "Session Time Limit: $limit minutes"
          Write-Host "Warning Alert at: $warn minutes (75%)"
          Write-Host "Critical Alert at: $critical minutes (90%)"

      - name: Auto-Reconnect Configuration
        if: failure()
        run: |
          Write-Host "=== Auto-Reconnect (Adaptive Strategy) ==="
          Write-Host "Strategy: Instant reconnect for transient failures"
          Write-Host "Max retries: $env:MAX_RETRIES"
          Write-Host "Preserving session state..."

  windows-server-2022:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'windows' || github.event_name != 'workflow_dispatch' }}
    runs-on: windows-2022
    timeout-minutes: ${{ fromJson(github.event.inputs.time_limit_minutes || '360') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup RDP - Windows Server 2022
        run: |
          Write-Host "=== V6 - Windows Server 2022 (RDP) ==="
          Write-Host "Platform: Windows Server 2022 | Arch: x64 | Protocol: RDP"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Write-Host "RDP enabled on Windows Server 2022"

      - name: Smart Notification - RDP Active
        run: |
          Write-Host "Notification Style: Silent | System Tray: On | Sound: Off"

      - name: Time Alert Setup
        run: |
          $limit = ${{ fromJson(github.event.inputs.time_limit_minutes || '360') }}
          Write-Host "Time Limit: $limit min | Warning: $([math]::Floor($limit*0.75)) min | Critical: $([math]::Floor($limit*0.90)) min"

  windows-10:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'windows' || github.event_name != 'workflow_dispatch' }}
    runs-on: windows-latest
    timeout-minutes: ${{ fromJson(github.event.inputs.time_limit_minutes || '360') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup RDP - Windows 10/11
        run: |
          Write-Host "=== V6 - Windows 10/11 (RDP) ==="
          Write-Host "Platform: Windows Desktop | Arch: x64 | Protocol: RDP"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Write-Host "RDP enabled on Windows Desktop"

      - name: Smart Notification - RDP Active
        run: |
          Write-Host "Notification Style: Silent | System Tray: On | Sound: Off"

  windows-11-gpu:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'windows' || github.event_name != 'workflow_dispatch' }}
    runs-on: windows-latest
    timeout-minutes: ${{ fromJson(github.event.inputs.time_limit_minutes || '360') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup RDP - Windows 11 with GPU
        run: |
          Write-Host "=== V6 - Windows 11 GPU (RDP) ==="
          Write-Host "Platform: Windows 11 | Arch: x64 | Protocol: RDP | GPU: Enabled"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -name "bEnumerateHWBeforeSW" -value 1
          Write-Host "RDP + GPU Acceleration enabled"

      - name: Smart Notification - RDP Active
        run: |
          Write-Host "Notification Style: Silent | GPU Mode: Active"

  # ═══════════════════════════════════════════
  # LINUX - 5 Runners (XRDP + XFCE)
  # ═══════════════════════════════════════════

  ubuntu-2204:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux' || github.event_name != 'workflow_dispatch' }}
    runs-on: ubuntu-22.04
    timeout-minutes: ${{ fromJson(github.event.inputs.time_limit_minutes || '360') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup XRDP + XFCE - Ubuntu 22.04
        run: |
          echo "=== V6 - Ubuntu 22.04 LTS (XRDP+XFCE) ==="
          echo "Platform: Ubuntu 22.04 | Arch: x64 | Protocol: XRDP"
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y xfce4 xfce4-goodies xrdp xorgxrdp
          sudo systemctl enable xrdp
          sudo systemctl start xrdp
          echo "XRDP+XFCE enabled on Ubuntu 22.04"

      - name: Smart Notification - Check Connection Type
        run: |
          echo "=== Smart Notification (Adaptive) ==="
          echo "Connection Type: XRDP Active"
          echo "Notification Style: Silent"
          echo "System Tray: Enabled | Sound: Disabled | Popups: Disabled"

      - name: Time Alert Setup
        run: |
          LIMIT=${{ github.event.inputs.time_limit_minutes || '360' }}
          WARN=$((LIMIT * 75 / 100))
          CRITICAL=$((LIMIT * 90 / 100))
          echo "Time Limit: ${LIMIT} min | Warning: ${WARN} min | Critical: ${CRITICAL} min"

      - name: Auto-Reconnect on Failure
        if: failure()
        run: |
          echo "=== Auto-Reconnect (Adaptive) ==="
          echo "Strategy: Instant for transient / Backoff for persistent"
          echo "Preserving session state..."
          sudo systemctl restart xrdp

  ubuntu-2404:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux' || github.event_name != 'workflow_dispatch' }}
    runs-on: ubuntu-24.04
    timeout-minutes: ${{ fromJson(github.event.inputs.time_limit_minutes || '360') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup XRDP + XFCE - Ubuntu 24.04
        run: |
          echo "=== V6 - Ubuntu 24.04 LTS (XRDP+XFCE) ==="
          echo "Platform: Ubuntu 24.04 | Arch: x64 | Protocol: XRDP"
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y xfce4 xfce4-goodies xrdp xorgxrdp
          sudo systemctl enable xrdp
          sudo systemctl start xrdp
          echo "XRDP+XFCE enabled on Ubuntu 24.04"

      - name: Smart Notification
        run: |
          echo "Notification Style: Silent | XRDP Active"

  debian-12:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux' || github.event_name != 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    container:
      image: debian:12
    timeout-minutes: ${{ fromJson(github.event.inputs.time_limit_minutes || '360') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup XRDP + XFCE - Debian 12
        run: |
          echo "=== V6 - Debian 12 (XRDP+XFCE) ==="
          echo "Platform: Debian 12 | Arch: x64 | Protocol: XRDP"
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y xfce4 xfce4-goodies xrdp xorgxrdp sudo systemd
          echo "XRDP+XFCE enabled on Debian 12"

      - name: Smart Notification
        run: |
          echo "Notification Style: Silent | XRDP Active"

  fedora-40:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux' || github.event_name != 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    container:
      image: fedora:40
    timeout-minutes: ${{ fromJson(github.event.inputs.time_limit_minutes || '360') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup XRDP + XFCE - Fedora 40
        run: |
          echo "=== V6 - Fedora 40 (XRDP+XFCE) ==="
          echo "Platform: Fedora 40 | Arch: x64 | Protocol: XRDP"
          dnf install -y xfce4 xfce4-goodies xrdp xorgxrdp
          systemctl enable xrdp
          echo "XRDP+XFCE enabled on Fedora 40"

      - name: Smart Notification
        run: |
          echo "Notification Style: Silent | XRDP Active"

  alpine-lightweight:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux' || github.event_name != 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    container:
      image: alpine:latest
    timeout-minutes: ${{ fromJson(github.event.inputs.time_limit_minutes || '360') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup XRDP + XFCE - Alpine (Lightweight)
        run: |
          echo "=== V6 - Alpine Linux (XRDP+XFCE Lightweight) ==="
          echo "Platform: Alpine | Arch: x64 | Protocol: XRDP | Mode: Lightweight"
          apk update
          apk add xfce4 xfce4-terminal xrdp
          echo "XRDP+XFCE (lightweight) enabled on Alpine"

      - name: Smart Notification
        run: |
          echo "Notification Style: Silent | XRDP Active | Lightweight Mode"

  # ═══════════════════════════════════════════
  # macOS - 3 Runners (VNC) بما فيها ARM
  # ═══════════════════════════════════════════

  macos-ventura-intel:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'macos' || github.event_name != 'workflow_dispatch' }}
    runs-on: macos-13
    timeout-minutes: ${{ fromJson(github.event.inputs.time_limit_minutes || '360') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup VNC - macOS Ventura (Intel)
        run: |
          echo "=== V6 - macOS Ventura (VNC) ==="
          echo "Platform: macOS Ventura | Arch: x86_64 (Intel) | Protocol: VNC"
          sudo defaults write /Library/Preferences/com.apple.RemoteManagement VNCOnlyLocalConnections -bool false
          sudo defaults write /Library/Preferences/com.apple.RemoteDesktop TextVNCPassword -string "${VNC_PASSWORD:-v6secure}"
          echo "VNC enabled on macOS Ventura (Intel)"

      - name: Smart Notification - VNC Active
        run: |
          echo "=== Smart Notification (Adaptive) ==="
          echo "Connection Type: VNC Active"
          echo "Notification Style: Visual Only"
          echo "System Tray: Enabled | Sound: Disabled | Popups: Enabled"
          echo "Email Fallback: Disabled"

      - name: Time Alert Setup
        run: |
          LIMIT=${{ github.event.inputs.time_limit_minutes || '360' }}
          WARN=$((LIMIT * 75 / 100))
          CRITICAL=$((LIMIT * 90 / 100))
          echo "Time Limit: ${LIMIT} min | Warning: ${WARN} min | Critical: ${CRITICAL} min"

      - name: Auto-Reconnect on Failure
        if: failure()
        run: |
          echo "=== Auto-Reconnect (Adaptive) ==="
          echo "Strategy: Backoff retry for VNC"
          echo "Preserving session state..."

  macos-sonoma-arm:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'macos' || github.event_name != 'workflow_dispatch' }}
    runs-on: macos-14
    timeout-minutes: ${{ fromJson(github.event.inputs.time_limit_minutes || '360') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup VNC - macOS Sonoma (Apple Silicon M1/M2)
        run: |
          echo "=== V6 - macOS Sonoma (VNC) ==="
          echo "Platform: macOS Sonoma | Arch: arm64 (Apple Silicon M1/M2) | Protocol: VNC"
          echo "Metal Support: Enabled"
          sudo defaults write /Library/Preferences/com.apple.RemoteManagement VNCOnlyLocalConnections -bool false
          sudo defaults write /Library/Preferences/com.apple.RemoteDesktop TextVNCPassword -string "${VNC_PASSWORD:-v6secure}"
          echo "VNC enabled on macOS Sonoma (ARM)"

      - name: Smart Notification - VNC Active
        run: |
          echo "Connection Type: VNC Active (Apple Silicon)"
          echo "Notification Style: Visual Only | Metal: Enabled"

  macos-sequoia-arm:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'macos' || github.event_name != 'workflow_dispatch' }}
    runs-on: macos-15
    timeout-minutes: ${{ fromJson(github.event.inputs.time_limit_minutes || '360') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup VNC - macOS Sequoia (ARM M3/M4)
        run: |
          echo "=== V6 - macOS Sequoia (VNC) ==="
          echo "Platform: macOS Sequoia | Arch: arm64 (Apple Silicon M3/M4) | Protocol: VNC"
          echo "Metal Support: Enabled | Apple Intelligence: Ready"
          sudo defaults write /Library/Preferences/com.apple.RemoteManagement VNCOnlyLocalConnections -bool false
          sudo defaults write /Library/Preferences/com.apple.RemoteDesktop TextVNCPassword -string "${VNC_PASSWORD:-v6secure}"
          echo "VNC enabled on macOS Sequoia (ARM M3/M4)"

      - name: Smart Notification - VNC Active
        run: |
          echo "Connection Type: VNC Active (Apple Silicon M3/M4)"
          echo "Notification Style: Visual Only | Metal: Enabled"

  # ═══════════════════════════════════════════
  # تنبيهات الوقت - إشعارات ذكية (حصري V6)
  # ═══════════════════════════════════════════

  time-alert-monitor:
    if: always()
    runs-on: ubuntu-latest
    needs:
      - windows-server-2019
      - windows-server-2022
      - windows-10
      - windows-11-gpu
      - ubuntu-2204
      - ubuntu-2404
      - debian-12
      - fedora-40
      - alpine-lightweight
      - macos-ventura-intel
      - macos-sonoma-arm
      - macos-sequoia-arm
    steps:
      - name: Session Time Report
        run: |
          echo "========================================"
          echo "  V6 Remote Desktop - Time Alert Report"
          echo "========================================"
          echo "Version: 6.0"
          echo "Total Runners: 12"
          echo "  Windows (RDP): 4"
          echo "  Linux (XRDP+XFCE): 5"
          echo "  macOS (VNC): 3 (incl. ARM)"
          echo "Smart Notifications: Adaptive"
          echo "Auto-Reconnect: Enabled (Adaptive)"
          echo "Multi-Session: Enabled"
          echo "Time Alerts: Enabled"
          echo "========================================"

      - name: Smart Notification - No Active Connection
        run: |
          echo "=== Smart Notification (Adaptive) ==="
          echo "Connection Type: No Active Connection"
          echo "Notification Style: FULL"
          echo "System Tray: Enabled"
          echo "Sound: Enabled"
          echo "Popups: Enabled"
          echo "Email: Enabled"
          echo "Push: Enabled"

      - name: Adaptive Notification Dispatch
        if: failure()
        run: |
          echo "=== Failure Notification ==="
          echo "Dispatching full notifications for failed runners..."
          echo "Email: Sent"
          echo "Push: Sent"
          echo "System Alert: Triggered"

  # ═══════════════════════════════════════════
  # ملخص الجلسات المتعددة
  # ═══════════════════════════════════════════

  session-summary:
    if: always()
    runs-on: ubuntu-latest
    needs:
      - windows-server-2019
      - windows-server-2022
      - windows-10
      - windows-11-gpu
      - ubuntu-2204
      - ubuntu-2404
      - debian-12
      - fedora-40
      - alpine-lightweight
      - macos-ventura-intel
      - macos-sonoma-arm
      - macos-sequoia-arm
      - time-alert-monitor
    steps:
      - name: V6 Multi-Session Summary
        run: |
          echo "============================================"
          echo "  V6 Session Summary - All Platforms Complete"
          echo "============================================"
          echo "Windows Runners:"
          echo "  1. Windows Server 2019 (RDP/x64)"
          echo "  2. Windows Server 2022 (RDP/x64)"
          echo "  3. Windows 10/11 (RDP/x64)"
          echo "  4. Windows 11 GPU (RDP/x64/GPU)"
          echo "Linux Runners:"
          echo "  5. Ubuntu 22.04 LTS (XRDP+XFCE/x64)"
          echo "  6. Ubuntu 24.04 LTS (XRDP+XFCE/x64)"
          echo "  7. Debian 12 (XRDP+XFCE/x64)"
          echo "  8. Fedora 40 (XRDP+XFCE/x64)"
          echo "  9. Alpine Linux (XRDP+XFCE/Lightweight)"
          echo "macOS Runners:"
          echo "  10. macOS Ventura (VNC/Intel)"
          echo "  11. macOS Sonoma (VNC/ARM M1-M2)"
          echo "  12. macOS Sequoia (VNC/ARM M3-M4)"
          echo "============================================"
          echo "V6 Exclusive Features:"
          echo "  [+] Smart Adaptive Notifications"
          echo "  [+] Auto-Reconnect (Adaptive Strategy)"
          echo "  [+] Multi-Session Support"
          echo "  [+] Time Alerts (50%/75%/90%/Critical)"
          echo "  [+] ARM Support (macOS Apple Silicon)"
          echo "============================================"
